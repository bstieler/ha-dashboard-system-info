title: System Info
views:
  - title: System Info
    path: system-info
    icon: mdi:chip
    cards:
      - type: markdown
        content: |
          # Raspberry Pi
          Key system information and history

      - type: entities
        title: Current Values
        show_header_toggle: false
        entities:
          - entity: sensor.processor_use
            name: Processor use
          - entity: sensor.last_boot
            name: Last boot
          - entity: sensor.system_since_last_boot
            name: Since last boot
          - entity: sensor.disk_free
            name: Disk free (/)
          - entity: sensor.memory_usage
            name: Memory usage
          - entity: sensor.processor_temperature
            name: Processor temperature

      - type: history-graph
        title: Processor Load (2h)
        hours_to_show: 2
        min_y_axis: 0
        max_y_axis: 100
        refresh_interval: 60
        entities:
          - entity: sensor.processor_use
            name: Processor use

      - type: history-graph
        title: Per-Core Load (2h)
        hours_to_show: 2
        min_y_axis: 0
        max_y_axis: 100
        refresh_interval: 60
        entities:
          - entity: sensor.processor_use_core_0
            name: Core 0
          - entity: sensor.processor_use_core_1
            name: Core 1
          - entity: sensor.processor_use_core_2
            name: Core 2
          - entity: sensor.processor_use_core_3
            name: Core 3

      - type: history-graph
        title: Memory Usage (2h)
        hours_to_show: 2
        min_y_axis: 0
        max_y_axis: 100
        refresh_interval: 60
        entities:
          - entity: sensor.memory_usage
            name: Memory usage

      - type: history-graph
        title: Disk Free / (48h)
        hours_to_show: 48
        min_y_axis: 0
        max_y_axis: 100
        refresh_interval: 60
        entities:
          - entity: sensor.disk_free
            name: Disk free (/)

      - type: history-graph
        title: Processor Temperature (2h)
        hours_to_show: 2
        min_y_axis: 0
        refresh_interval: 60
        entities:
          - entity: sensor.processor_temperature
            name: Processor temperature

      - type: button
        name: API Status
        icon: mdi:cloud-check
        tap_action:
          action: navigate
          navigation_path: /dashboard-system-info/api-status

  - title: HA Config Deploy
    path: ha-config-deploy
    icon: mdi:source-branch
    cards:
      - type: markdown
        title: Projekt Overview
        content: |
          {%- set projects = state_attr('sensor.ha_config_deploy_overview', 'projects') or [] -%}
          {%- if projects | count == 0 -%}
          _Keine Deploy-Daten verfuegbar. Ein Deploy mit dem aktuellen Skript erzeugt die Metadaten._
          {%- else -%}
          | Projekt | Version | Erstellt | Letzter Deploy | Branch |
          |---------|---------|----------|----------------|--------|
          {%- for p in projects %}
          | {{ p.project_id }} | `{{ p.version }}` | {{ p.created_at_local | default('—') }} | {{ p.deployed_at_local | default('—') }} | {{ p.branch }} |
          {%- endfor -%}
          {%- endif -%}

      - type: button
        name: Releases
        icon: mdi:tag-multiple
        tap_action:
          action: navigate
          navigation_path: /dashboard-system-info/releases

  - title: Releases
    path: releases
    icon: mdi:tag-multiple
    cards:
      - !include releases_card.yaml

  - title: API Status
    path: api-status
    icon: mdi:cloud-check
    cards:
      - type: markdown
        content: |
          # API Status
          Health and reachability of external services.

      - type: entities
        title: Overall Status
        show_header_toggle: false
        state_color: true
        entities:
          - entity: sensor.api_health_overall
            name: Overall

      - type: markdown
        title: External Connections
        content: |
          {%- set sources = [
            ('Open-Meteo', 'sensor.api_health_open_meteo'),
            ('AlphaESS', 'sensor.api_health_alphaess'),
            ('DWD', 'sensor.api_health_dwd'),
            ('SwitchBot BLE', 'sensor.api_health_switchbot_ble')
          ] -%}
          | Service | Status | Last Call | Last Success | Details |
          |---------|--------|-----------|--------------|---------|
          {%- for name, entity in sources %}
          {%- set status = states(entity) | default('unknown') %}
          {%- set icon = '🔴' if status == 'failed' else '🟡' if status == 'degraded' else '🟢' if status == 'ok' else '⚪' %}
          {%- set last_call = state_attr(entity, 'last_call') | default('—') %}
          {%- set last_success = state_attr(entity, 'last_success') | default('—') %}
          {%- set details = state_attr(entity, 'details') | default('—') %}
          | {{ name }} | {{ icon }} {{ status }} | {{ last_call }} | {{ last_success }} | {{ details }} |
          {%- endfor %}

      - type: button
        name: Back to System Info
        icon: mdi:arrow-left
        tap_action:
          action: navigate
          navigation_path: /dashboard-system-info/system-info
