# Feature package: System information sensors
command_line:
  - sensor:
      name: Processor use
      unique_id: system_processor_use
      command: >-
        sh -c 'PREV_IDLE=$(awk '"'"'/^cpu / {print $5}'"'"' /proc/stat); PREV_TOTAL=$(awk '"'"'/^cpu / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); sleep 1; IDLE=$(awk '"'"'/^cpu / {print $5}'"'"' /proc/stat); TOTAL=$(awk '"'"'/^cpu / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); DIFF_IDLE=$((IDLE-PREV_IDLE)); DIFF_TOTAL=$((TOTAL-PREV_TOTAL)); awk -v idle=$DIFF_IDLE -v total=$DIFF_TOTAL '"'"'BEGIN { if (total <= 0) print 0; else printf "%.1f", (100 * (total - idle) / total) }'"'"''
      unit_of_measurement: "%"
      scan_interval: 60

  - sensor:
      name: Memory free
      unique_id: system_memory_free
      command: >-
        sh -c 'free -m | awk '"'"'/^Mem:/ {print $4}'"'"''
      unit_of_measurement: "MiB"
      scan_interval: 60

  - sensor:
      name: Memory usage
      unique_id: system_memory_usage
      command: >-
        sh -c 'free -m | awk '"'"'/^Mem:/ { if ($2 > 0) printf "%.1f", ($3 / $2) * 100; else print 0 }'"'"''
      unit_of_measurement: "%"
      scan_interval: 60

  - sensor:
      name: Disk free
      unique_id: system_disk_free_root
      command: >-
        sh -c 'df -BG / | awk '"'"'NR==2 {gsub(/G/, "", $4); print $4}'"'"''
      unit_of_measurement: "GiB"
      scan_interval: 300

  - sensor:
      name: Processor temperature
      unique_id: system_processor_temperature
      command: >-
        sh -c 'awk '"'"'{printf "%.1f", $1/1000}'"'"' /sys/class/thermal/thermal_zone0/temp'
      unit_of_measurement: "°C"
      device_class: temperature
      scan_interval: 60

  - sensor:
      name: Last boot
      unique_id: system_last_boot
      command: >-
        sh -c 'BOOT=$(awk '"'"'/^btime / {print $2}'"'"' /proc/stat); date -d "@$BOOT" "+%Y-%m-%dT%H:%M:%S%z" 2>/dev/null || echo unavailable'
      scan_interval: 3600

  - sensor:
      name: Processor use core 0
      unique_id: system_processor_use_core_0
      command: >-
        sh -c 'PREV_IDLE=$(awk '"'"'/^cpu0 / {print $5}'"'"' /proc/stat); PREV_TOTAL=$(awk '"'"'/^cpu0 / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); sleep 1; IDLE=$(awk '"'"'/^cpu0 / {print $5}'"'"' /proc/stat); TOTAL=$(awk '"'"'/^cpu0 / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); DIFF_IDLE=$((IDLE-PREV_IDLE)); DIFF_TOTAL=$((TOTAL-PREV_TOTAL)); awk -v idle=$DIFF_IDLE -v total=$DIFF_TOTAL '"'"'BEGIN { if (total <= 0) print 0; else printf "%.1f", (100 * (total - idle) / total) }'"'"''
      unit_of_measurement: "%"
      scan_interval: 60

  - sensor:
      name: Processor use core 1
      unique_id: system_processor_use_core_1
      command: >-
        sh -c 'PREV_IDLE=$(awk '"'"'/^cpu1 / {print $5}'"'"' /proc/stat); PREV_TOTAL=$(awk '"'"'/^cpu1 / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); sleep 1; IDLE=$(awk '"'"'/^cpu1 / {print $5}'"'"' /proc/stat); TOTAL=$(awk '"'"'/^cpu1 / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); DIFF_IDLE=$((IDLE-PREV_IDLE)); DIFF_TOTAL=$((TOTAL-PREV_TOTAL)); awk -v idle=$DIFF_IDLE -v total=$DIFF_TOTAL '"'"'BEGIN { if (total <= 0) print 0; else printf "%.1f", (100 * (total - idle) / total) }'"'"''
      unit_of_measurement: "%"
      scan_interval: 60

  - sensor:
      name: Processor use core 2
      unique_id: system_processor_use_core_2
      command: >-
        sh -c 'PREV_IDLE=$(awk '"'"'/^cpu2 / {print $5}'"'"' /proc/stat); PREV_TOTAL=$(awk '"'"'/^cpu2 / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); sleep 1; IDLE=$(awk '"'"'/^cpu2 / {print $5}'"'"' /proc/stat); TOTAL=$(awk '"'"'/^cpu2 / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); DIFF_IDLE=$((IDLE-PREV_IDLE)); DIFF_TOTAL=$((TOTAL-PREV_TOTAL)); awk -v idle=$DIFF_IDLE -v total=$DIFF_TOTAL '"'"'BEGIN { if (total <= 0) print 0; else printf "%.1f", (100 * (total - idle) / total) }'"'"''
      unit_of_measurement: "%"
      scan_interval: 60

  - sensor:
      name: Processor use core 3
      unique_id: system_processor_use_core_3
      command: >-
        sh -c 'PREV_IDLE=$(awk '"'"'/^cpu3 / {print $5}'"'"' /proc/stat); PREV_TOTAL=$(awk '"'"'/^cpu3 / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); sleep 1; IDLE=$(awk '"'"'/^cpu3 / {print $5}'"'"' /proc/stat); TOTAL=$(awk '"'"'/^cpu3 / {sum=0; for (i=2; i<=8; i++) sum+=$i; print sum}'"'"' /proc/stat); DIFF_IDLE=$((IDLE-PREV_IDLE)); DIFF_TOTAL=$((TOTAL-PREV_TOTAL)); awk -v idle=$DIFF_IDLE -v total=$DIFF_TOTAL '"'"'BEGIN { if (total <= 0) print 0; else printf "%.1f", (100 * (total - idle) / total) }'"'"''
      unit_of_measurement: "%"
      scan_interval: 60

  - sensor:
      name: HA Config Deploy Overview
      unique_id: ha_config_deploy_overview
      command: >-
        python3 -c "import json, glob; files=sorted(glob.glob('/config/.ha-config-deploy/state/*.json')); projects=[]; [projects.append(json.load(open(f))) for f in files if f.endswith('.json')]; print(json.dumps({'count': len(projects), 'projects': projects}))"
      value_template: "{{ value_json.count }}"
      json_attributes:
        - projects
      scan_interval: 300

template:
  - sensor:
      - name: System Since Last Boot
        unique_id: system_since_last_boot
        icon: mdi:clock-outline
        state: >-
          {% set last_boot_raw = states('sensor.last_boot') %}
          {% set last_boot = last_boot_raw | as_datetime(default=None) %}
          {% if last_boot is none %}
            unavailable
          {% else %}
            {% set seconds = (now() - (last_boot | as_local)).total_seconds() | int(0) %}
            {% set days = (seconds // 86400) | int %}
            {% set hours = ((seconds % 86400) // 3600) | int %}
            {% set minutes = ((seconds % 3600) // 60) | int %}
            {{ days }}d {{ hours }}h {{ minutes }}m
          {% endif %}

      # API Health sensors for the System Info Dashboard (STG-6.14 Phase A).
      # Real-time Open-Meteo instrumentation from STG-6.15 is used when available;
      # otherwise the sensor falls back to deriving status from model entities.
      - name: API Health Open-Meteo
        unique_id: api_health_open_meteo
        icon: mdi:cloud
        state: >-
          {% set overall = states('sensor.api_health_overall') %}
          {% set rt_forecast = state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_forecast_status') %}
          {% if overall not in ['unavailable', 'unknown', 'none'] and rt_forecast is not none %}
            {% set statuses = [
              state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_forecast_status'),
              state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_archive_status'),
              state_attr('sensor.api_health_overall', 'house_consumption_forecast_open_meteo_forecast_status'),
              state_attr('sensor.api_health_overall', 'house_consumption_forecast_open_meteo_archive_status')
            ] | select('defined') | select('ne', none) | list %}
            {% if 'failed' in statuses %}
              failed
            {% elif 'degraded' in statuses %}
              degraded
            {% elif 'unknown' in statuses %}
              unknown
            {% elif statuses | count > 0 %}
              ok
            {% else %}
              unknown
            {% endif %}
          {% else %}
            {% set pv_status = states('sensor.pv_forecast_model_status') %}
            {% set hcf_status = states('sensor.house_consumption_forecast_model_status') %}
            {% set pv_unknown = pv_status in ['unavailable', 'unknown', 'none'] %}
            {% set hcf_unknown = hcf_status in ['unavailable', 'unknown', 'none'] %}
            {% if pv_unknown and hcf_unknown %}
              unknown
            {% elif pv_unknown or hcf_unknown %}
              degraded
            {% else %}
              {% set pv_error = state_attr('sensor.pv_forecast_model_status', 'last_refresh_error') %}
              {% set hcf_error = state_attr('sensor.house_consumption_forecast_model_status', 'last_refresh_error') %}
              {% set pv_source = state_attr('sensor.pv_forecast_model_status', 'weather_context_source') %}
              {% set hcf_archive = state_attr('sensor.house_consumption_forecast_model_status', 'weather_archive_fetch_status') %}
              {% set hcf_forecast = state_attr('sensor.house_consumption_forecast_model_status', 'weather_forecast_fetch_status') %}
              {% if pv_error or hcf_error %}
                failed
              {% elif pv_source in ['cache', 'mixed'] or hcf_archive == 'failed' or hcf_forecast == 'failed' %}
                degraded
              {% else %}
                ok
              {% endif %}
            {% endif %}
          {% endif %}
        attributes:
          source_entity: "sensor.api_health_overall, sensor.pv_forecast_model_status, sensor.house_consumption_forecast_model_status"
          last_call: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_last_call = state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_forecast_last_call') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and rt_last_call is not none %}
              {% set timestamps = [
                state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_forecast_last_call'),
                state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_archive_last_call'),
                state_attr('sensor.api_health_overall', 'house_consumption_forecast_open_meteo_forecast_last_call'),
                state_attr('sensor.api_health_overall', 'house_consumption_forecast_open_meteo_archive_last_call')
              ] | select('defined') | select('ne', none) | select('string') | list %}
              {% if timestamps | count > 0 %}
                {{ timestamps | max | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% else %}
              {% set pv_ts = state_attr('sensor.pv_forecast_model_status', 'weather_last_incremental_sync') %}
              {% set hcf_ts = state_attr('sensor.house_consumption_forecast_model_status', 'weather_last_incremental_sync') %}
              {% set timestamps = [pv_ts, hcf_ts] | select('string') | list %}
              {% if timestamps | count > 0 %}
                {{ timestamps | max | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% endif %}
          last_success: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_last_success = state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_forecast_last_success') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and rt_last_success is not none %}
              {% set timestamps = [
                state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_forecast_last_success'),
                state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_archive_last_success'),
                state_attr('sensor.api_health_overall', 'house_consumption_forecast_open_meteo_forecast_last_success'),
                state_attr('sensor.api_health_overall', 'house_consumption_forecast_open_meteo_archive_last_success')
              ] | select('defined') | select('ne', none) | select('string') | list %}
              {% if timestamps | count > 0 %}
                {{ timestamps | max | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% else %}
              {% set pv_error = state_attr('sensor.pv_forecast_model_status', 'last_refresh_error') %}
              {% set hcf_error = state_attr('sensor.house_consumption_forecast_model_status', 'last_refresh_error') %}
              {% if pv_error or hcf_error %}
                unavailable
              {% else %}
                {% set pv_ts = state_attr('sensor.pv_forecast_model_status', 'weather_last_incremental_sync') %}
                {% set hcf_ts = state_attr('sensor.house_consumption_forecast_model_status', 'weather_last_incremental_sync') %}
                {% set timestamps = [pv_ts, hcf_ts] | select('string') | list %}
                {% if timestamps | count > 0 %}
                  {{ timestamps | max | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
                {% else %}
                  unavailable
                {% endif %}
              {% endif %}
            {% endif %}
          details: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_forecast = state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_forecast_status') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and rt_forecast is not none %}
              PV forecast: {{ rt_forecast | default('unknown', true) }},
              PV archive: {{ state_attr('sensor.api_health_overall', 'pv_forecast_open_meteo_archive_status') | default('unknown', true) }},
              HCF forecast: {{ state_attr('sensor.api_health_overall', 'house_consumption_forecast_open_meteo_forecast_status') | default('unknown', true) }},
              HCF archive: {{ state_attr('sensor.api_health_overall', 'house_consumption_forecast_open_meteo_archive_status') | default('unknown', true) }}
            {% else %}
              PV source: {{ state_attr('sensor.pv_forecast_model_status', 'weather_context_source') | default('unknown', true) }},
              HCF archive: {{ state_attr('sensor.house_consumption_forecast_model_status', 'weather_archive_fetch_status') | default('unknown', true) }},
              HCF forecast: {{ state_attr('sensor.house_consumption_forecast_model_status', 'weather_forecast_fetch_status') | default('unknown', true) }}
            {% endif %}

      - name: API Health AlphaESS
        unique_id: api_health_alphaess
        icon: mdi:battery
        state: >-
          {% set overall = states('sensor.api_health_overall') %}
          {% set rt_modbus = state_attr('sensor.api_health_overall', 'alphaess_modbus_status') %}
          {% set rt_cloud = state_attr('sensor.api_health_overall', 'alphaess_cloud_status') %}
          {% if overall not in ['unavailable', 'unknown', 'none'] and (rt_modbus is not none or rt_cloud is not none) %}
            {% set statuses = [rt_modbus, rt_cloud] | select('defined') | select('ne', none) | list %}
            {% if 'failed' in statuses %}
              failed
            {% elif 'degraded' in statuses %}
              degraded
            {% elif 'unknown' in statuses %}
              unknown
            {% elif statuses | count > 0 %}
              ok
            {% else %}
              unknown
            {% endif %}
          {% else %}
            {% set runtime = states('sensor.alphaess_charge_control_runtime') %}
            {% if runtime in ['unavailable', 'unknown', 'none'] %}
              unknown
            {% else %}
              {% set missing = state_attr('sensor.alphaess_charge_control_runtime', 'control_runtime_missing_entities') or [] %}
              {% set modbus_missing = missing | select('match', 'sensor\.alpha_ess_.*') | list | count > 0 %}
              {% set cloud_missing = missing | select('match', 'sensor\.instantaneous_.*') | list | count > 0 %}
              {% set cloud_soc_missing = 'sensor.pv_battery_soc' in missing %}
              {% if modbus_missing and (cloud_missing or cloud_soc_missing) %}
                failed
              {% elif modbus_missing or cloud_missing or cloud_soc_missing %}
                degraded
              {% else %}
                ok
              {% endif %}
            {% endif %}
          {% endif %}
        attributes:
          source_entity: "sensor.api_health_overall, sensor.alphaess_charge_control_runtime"
          last_call: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_modbus = state_attr('sensor.api_health_overall', 'alphaess_modbus_last_call') %}
            {% set rt_cloud = state_attr('sensor.api_health_overall', 'alphaess_cloud_last_call') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and (rt_modbus is not none or rt_cloud is not none) %}
              {% set timestamps = [rt_modbus, rt_cloud] | select('defined') | select('ne', none) | select('string') | list %}
              {% if timestamps | count > 0 %}
                {{ timestamps | max | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% else %}
              {% if states('sensor.alphaess_charge_control_runtime') not in ['unavailable', 'unknown', 'none'] %}
                {{ states.sensor.alphaess_charge_control_runtime.last_updated | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% endif %}
          last_success: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_modbus = state_attr('sensor.api_health_overall', 'alphaess_modbus_last_success') %}
            {% set rt_cloud = state_attr('sensor.api_health_overall', 'alphaess_cloud_last_success') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and (rt_modbus is not none or rt_cloud is not none) %}
              {% set timestamps = [rt_modbus, rt_cloud] | select('defined') | select('ne', none) | select('string') | list %}
              {% if timestamps | count > 0 %}
                {{ timestamps | max | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% else %}
              {% set missing = state_attr('sensor.alphaess_charge_control_runtime', 'control_runtime_missing_entities') or [] %}
              {% if missing | count > 0 %}
                unavailable
              {% else %}
                {% if states('sensor.alphaess_charge_control_runtime') not in ['unavailable', 'unknown', 'none'] %}
                  {{ states.sensor.alphaess_charge_control_runtime.last_updated | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
                {% else %}
                  unavailable
                {% endif %}
              {% endif %}
            {% endif %}
          details: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_modbus = state_attr('sensor.api_health_overall', 'alphaess_modbus_status') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and rt_modbus is not none %}
              Modbus: {{ rt_modbus | default('unknown', true) }}, Cloud: {{ state_attr('sensor.api_health_overall', 'alphaess_cloud_status') | default('unknown', true) }}
            {% else %}
              Missing entities: {{ state_attr('sensor.alphaess_charge_control_runtime', 'control_runtime_missing_entities') | default(['unknown']) | join(', ') }}
            {% endif %}

      - name: API Health DWD
        unique_id: api_health_dwd
        icon: mdi:weather-cloudy
        state: >-
          {% set overall = states('sensor.api_health_overall') %}
          {% set rt_nowcast = state_attr('sensor.api_health_overall', 'dwd_nowcast_status') %}
          {% set rt_hourly = state_attr('sensor.api_health_overall', 'dwd_forecast_hourly_status') %}
          {% set rt_daily = state_attr('sensor.api_health_overall', 'dwd_forecast_daily_status') %}
          {% if overall not in ['unavailable', 'unknown', 'none'] and (rt_nowcast is not none or rt_hourly is not none or rt_daily is not none) %}
            {% set statuses = [rt_nowcast, rt_hourly, rt_daily] | select('defined') | select('ne', none) | list %}
            {% if 'failed' in statuses %}
              failed
            {% elif 'degraded' in statuses %}
              degraded
            {% elif 'unknown' in statuses %}
              unknown
            {% elif statuses | count > 0 %}
              ok
            {% else %}
              unknown
            {% endif %}
          {% else %}
            {% set entities = ['sensor.dwd_nowcast_text', 'sensor.dwd_forecast_json', 'sensor.dwd_forecast_daily_json', 'sensor.dwd_radar_image_url'] %}
            {% set unavailable_count = entities | map('states') | select('in', ['unavailable', 'unknown', 'none']) | list | count %}
            {% if unavailable_count == entities | count %}
              unknown
            {% elif unavailable_count > 0 %}
              failed
            {% else %}
              ok
            {% endif %}
          {% endif %}
        attributes:
          source_entity: "sensor.api_health_overall, sensor.dwd_nowcast_text, sensor.dwd_forecast_json, sensor.dwd_forecast_daily_json, sensor.dwd_radar_image_url"
          last_call: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_nowcast = state_attr('sensor.api_health_overall', 'dwd_nowcast_last_call') %}
            {% set rt_hourly = state_attr('sensor.api_health_overall', 'dwd_forecast_hourly_last_call') %}
            {% set rt_daily = state_attr('sensor.api_health_overall', 'dwd_forecast_daily_last_call') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and (rt_nowcast is not none or rt_hourly is not none or rt_daily is not none) %}
              {% set timestamps = [rt_nowcast, rt_hourly, rt_daily] | select('defined') | select('ne', none) | select('string') | list %}
              {% if timestamps | count > 0 %}
                {{ timestamps | max | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% else %}
              {% set timestamps = [] %}
              {% if states('sensor.dwd_nowcast_text') not in ['unavailable', 'unknown', 'none'] %}
                {% set timestamps = timestamps + [states.sensor.dwd_nowcast_text.last_updated] %}
              {% endif %}
              {% if states('sensor.dwd_forecast_json') not in ['unavailable', 'unknown', 'none'] %}
                {% set timestamps = timestamps + [states.sensor.dwd_forecast_json.last_updated] %}
              {% endif %}
              {% if states('sensor.dwd_forecast_daily_json') not in ['unavailable', 'unknown', 'none'] %}
                {% set timestamps = timestamps + [states.sensor.dwd_forecast_daily_json.last_updated] %}
              {% endif %}
              {% if states('sensor.dwd_radar_image_url') not in ['unavailable', 'unknown', 'none'] %}
                {% set timestamps = timestamps + [states.sensor.dwd_radar_image_url.last_updated] %}
              {% endif %}
              {% if timestamps | count > 0 %}
                {{ timestamps | max | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% endif %}
          last_success: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_nowcast = state_attr('sensor.api_health_overall', 'dwd_nowcast_last_success') %}
            {% set rt_hourly = state_attr('sensor.api_health_overall', 'dwd_forecast_hourly_last_success') %}
            {% set rt_daily = state_attr('sensor.api_health_overall', 'dwd_forecast_daily_last_success') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and (rt_nowcast is not none or rt_hourly is not none or rt_daily is not none) %}
              {% set timestamps = [rt_nowcast, rt_hourly, rt_daily] | select('defined') | select('ne', none) | select('string') | list %}
              {% if timestamps | count > 0 %}
                {{ timestamps | max | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% else %}
              {% set entities = ['sensor.dwd_nowcast_text', 'sensor.dwd_forecast_json', 'sensor.dwd_forecast_daily_json', 'sensor.dwd_radar_image_url'] %}
              {% set unavailable_count = entities | map('states') | select('in', ['unavailable', 'unknown', 'none']) | list | count %}
              {% if unavailable_count > 0 %}
                unavailable
              {% else %}
                {% set timestamps = [] %}
                {% if states('sensor.dwd_nowcast_text') not in ['unavailable', 'unknown', 'none'] %}
                  {% set timestamps = timestamps + [states.sensor.dwd_nowcast_text.last_updated] %}
                {% endif %}
                {% if states('sensor.dwd_forecast_json') not in ['unavailable', 'unknown', 'none'] %}
                  {% set timestamps = timestamps + [states.sensor.dwd_forecast_json.last_updated] %}
                {% endif %}
                {% if states('sensor.dwd_forecast_daily_json') not in ['unavailable', 'unknown', 'none'] %}
                  {% set timestamps = timestamps + [states.sensor.dwd_forecast_daily_json.last_updated] %}
                {% endif %}
                {% if states('sensor.dwd_radar_image_url') not in ['unavailable', 'unknown', 'none'] %}
                  {% set timestamps = timestamps + [states.sensor.dwd_radar_image_url.last_updated] %}
                {% endif %}
                {% if timestamps | count > 0 %}
                  {{ timestamps | max | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
                {% else %}
                  unavailable
                {% endif %}
              {% endif %}
            {% endif %}
          details: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_nowcast = state_attr('sensor.api_health_overall', 'dwd_nowcast_status') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and rt_nowcast is not none %}
              nowcast: {{ rt_nowcast | default('unknown', true) }},
              hourly: {{ state_attr('sensor.api_health_overall', 'dwd_forecast_hourly_status') | default('unknown', true) }},
              daily: {{ state_attr('sensor.api_health_overall', 'dwd_forecast_daily_status') | default('unknown', true) }}
            {% else %}
              sensor.dwd_nowcast_text: {{ states('sensor.dwd_nowcast_text') | default('unknown') }},
              sensor.dwd_forecast_json: {{ states('sensor.dwd_forecast_json') | default('unknown') }},
              sensor.dwd_forecast_daily_json: {{ states('sensor.dwd_forecast_daily_json') | default('unknown') }},
              sensor.dwd_radar_image_url: {{ states('sensor.dwd_radar_image_url') | default('unknown') }}
            {% endif %}

      - name: API Health SwitchBot BLE
        unique_id: api_health_switchbot_ble
        icon: mdi:bluetooth
        state: >-
          {% set overall = states('sensor.api_health_overall') %}
          {% set rt_status = state_attr('sensor.api_health_overall', 'switchbot_ble_status') %}
          {% if overall not in ['unavailable', 'unknown', 'none'] and rt_status is not none %}
            {{ rt_status }}
          {% else %}
            {% set err = states('input_boolean.zs7_circ_pump_ble_error') %}
            {% if err == 'on' %}
              failed
            {% elif err == 'off' %}
              ok
            {% else %}
              unknown
            {% endif %}
          {% endif %}
        attributes:
          source_entity: "sensor.api_health_overall, input_boolean.zs7_circ_pump_ble_error"
          last_call: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_last_call = state_attr('sensor.api_health_overall', 'switchbot_ble_last_call') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and rt_last_call is not none %}
              {{ rt_last_call | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
            {% else %}
              {% if states('input_boolean.zs7_circ_pump_ble_error') not in ['unavailable', 'unknown', 'none'] %}
                {{ states.input_boolean.zs7_circ_pump_ble_error.last_updated | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% endif %}
          last_success: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_last_success = state_attr('sensor.api_health_overall', 'switchbot_ble_last_success') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and rt_last_success is not none %}
              {{ rt_last_success | as_datetime | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
            {% else %}
              {% if is_state('input_boolean.zs7_circ_pump_ble_error', 'off') %}
                {{ states.input_boolean.zs7_circ_pump_ble_error.last_updated | as_local | as_timestamp | timestamp_custom('%d.%m.%Y %H:%M', true) }}
              {% else %}
                unavailable
              {% endif %}
            {% endif %}
          details: >-
            {% set overall = states('sensor.api_health_overall') %}
            {% set rt_error = state_attr('sensor.api_health_overall', 'switchbot_ble_error') %}
            {% if overall not in ['unavailable', 'unknown', 'none'] and rt_error is not none %}
              {{ rt_error }}
            {% else %}
              SwitchBot BLE error flag
            {% endif %}

# STG-6.15: Load the api_health sensor platform so sensor.api_health_overall
# is created and the api_health.report service becomes available. The overall
# sensor replaces the previous Phase-A template sensor and is updated in real
# time by the api_health service.
sensor:
  - platform: api_health
